 NZL_HOMEGUARD:0 "Home Guard"
 ##Focuses
 NZL_universal_healthcare:0 "Universal Healthcare"
 NZL_universal_healthcare_desc:0 "The Labour Government has long advocated for a comprehensive healthcare system accessible to all New Zealanders. By establishing a universal healthcare program, we will ensure that medical treatment is available regardless of one's ability to pay."
 
 NZL_state_housing_program:0 "State Housing Program"
 NZL_state_housing_program_desc:0 "Housing shortages plague our cities and rural communities alike. A comprehensive state housing program will provide affordable homes for working-class New Zealanders and address the growing housing crisis."
 
 NZL_broadcasting_act:0 "Broadcasting Act"
 NZL_broadcasting_act_desc:0 "Radio broadcasting has become an essential medium for national communication. By regulating and expanding our broadcasting capabilities through new legislation, we can ensure that all New Zealanders remain informed and connected."
 
 NZL_the_four_quaters:0 "The Four Quarters"
 NZL_the_four_quaters_desc:0 "New Zealand's strategic position in the Pacific can be divided into four vital quarters, each requiring attention and development. By addressing all four quarters comprehensively, we will strengthen our nation's defense and prosperity."
 
 NZL_peter_fraser_ascension:0 "Peter Fraser's Ascension"
 NZL_peter_fraser_ascension_desc:0 "With the passing of Michael Joseph Savage, Peter Fraser has risen to lead the Labour Party and our nation. His experience and dedication will guide New Zealand through these challenging times."
 
 NZL_the_land_girls:0 "The Land Girls"
 NZL_the_land_girls_desc:0 "With our men serving in the armed forces, we must mobilize women to work the land. The Women's Land Service will train and deploy women to farms across New Zealand, ensuring agricultural production continues unabated."
 
 NZL_industrial_manpower_emergency_regulations:0 "Industrial Manpower Emergency Regulations"
 NZL_industrial_manpower_emergency_regulations_desc:0 "In times of war, we must ensure that our industrial workforce is directed where it is most needed. These emergency regulations will allow the government to allocate manpower to critical industries."
 
 NZL_economic_stabilization_commission:0 "Economic Stabilization Commission"
 NZL_economic_stabilization_commission_desc:0 "To prevent runaway inflation and ensure fair distribution of resources during wartime, we will establish an Economic Stabilization Commission with broad powers to control prices and wages."
 
 NZL_homeguard_mobilization:0 "Home Guard Mobilization"
 NZL_homeguard_mobilization_desc:0 "While our finest soldiers fight abroad, we must not leave our homeland defenseless. By mobilizing a Home Guard force, we can prepare our citizens to defend New Zealand from potential invasion."
 
 NZL_the_ford_plant:0 "The Ford Plant"
 NZL_the_ford_plant_desc:0 "Ford Motor Company has established operations in New Zealand, but their potential remains untapped. By expanding the Ford plant, we can boost our industrial capacity and produce vehicles essential for both civilian and military needs."
 
 NZL_expand_the_mining_companies:0 "Expand the Mining Companies"
 NZL_expand_the_mining_companies_desc:0 "New Zealand's mineral wealth—from coal to gold—has long contributed to our economy. By investing in our mining companies and modernizing their operations, we can secure vital resources for our growing industrial base."
 
 NZL_from_farms_to_factories:0 "From Farms to Factories"
 NZL_from_farms_to_factories_desc:0 "While agriculture has been the backbone of our economy, the modern world demands industrial strength. We must transition portions of our workforce and resources from farms to factories to build a more balanced economy."
 
 NZL_hydroelectric_powerplant:0 "The Hydroelectric Powerplant"
 NZL_hydroelectric_powerplant_desc:0 "New Zealand's rivers offer tremendous potential for hydroelectric power generation. By constructing modern hydroelectric facilities, we can provide cheap, reliable electricity to power our industries and cities."
 
 NZL_invest_in_eastern_new_zealand:0 "Invest in Eastern New Zealand"
 NZL_invest_in_eastern_new_zealand_desc:0 "The eastern regions of New Zealand have long been underdeveloped compared to our western population centers. Strategic investment in infrastructure and industry in these areas will strengthen our entire nation."
 
 NZL_expand_wairarapa_livestock:0 "Expand Wairarapa Livestock"
 NZL_expand_wairarapa_livestock_desc:0 "The Wairarapa region has proven ideal for livestock farming, particularly sheep and cattle. By expanding operations and improving breeding programs, we can increase our agricultural output and export capacity."
 
 NZL_expand_the_massey_university:0 "Expand the Massey University"
 NZL_expand_the_massey_university_desc:0 "Massey Agricultural College has been instrumental in advancing New Zealand's farming techniques. Expanding it into a full university will provide research capabilities and trained professionals essential for modernizing our agricultural and industrial sectors."
 
 NZL_guaranted_prices_for_dairy:0 "Guaranteed Prices for Dairy"
 NZL_guaranted_prices_for_dairy_desc:0 "New Zealand's dairy farmers face uncertainty in volatile export markets. By guaranteeing minimum prices for dairy products, we can ensure stability for our farmers and maintain consistent production levels."

 NZL_economic_protectionism:0 "Economic Protectionism"
 NZL_economic_protectionism_desc:0 "In an increasingly uncertain world, we must protect our domestic industries from foreign competition. Implementing protective tariffs and trade restrictions will safeguard New Zealand jobs and encourage local manufacturing."
 
 NZL_synthethic_rubber_production:0 "Synthetic Rubber Production"
 NZL_synthethic_rubber_production_desc:0 "With natural rubber supplies vulnerable to disruption, we must develop our own synthetic rubber industry. This will ensure our military and civilian vehicles can continue operating even if traditional supply lines are cut."
 
 NZL_attract_refugees_to_addis_ababa:0 "Attract Refugees to Addis Ababa"
 NZL_attract_refugees_to_addis_ababa_desc:0 "As our forces operate in East Africa, we can support the establishment of a safe haven in Addis Ababa for displaced persons and refugees fleeing conflict. By providing security and organizing humanitarian efforts in the Ethiopian capital, we will offer sanctuary to those in need while strengthening our presence in the region."
 
 IOG_USA_tank_sharing:0 "American Tank Sharing Program"
 IOG_USA_tank_sharing_desc:0 "Through cooperation with the United States, we can gain access to American tank designs and technical packages to modernize our armored forces."
 
 IOG_USA_tank_sharing_M2CHASSIS:0 "M2 Light Tank Technical Package"
 IOG_USA_tank_sharing_M2CHASSIS_desc:0 "Request access to the M2 Light Tank technical specifications and design documents from the United States."
 IOG_USA_tank_sharing_M2CHASSIS_tt:0 "Gives access to the §YM2 Light Tank§! technical package."
 
 IOG_USA_tank_sharing_M2A4:0 "M2A4 Light Tank Technical Package"
 IOG_USA_tank_sharing_M2A4_desc:0 "Request access to the improved M2A4 Light Tank technical specifications and design documents from the United States."
 IOG_USA_tank_sharing_M2A4_tt:0 "Gives access to the §YM2A4 Light Tank§! technical package."
 
 IOG_USA_tank_sharing_M3STUART:0 "M3 Stuart Technical Package"
 IOG_USA_tank_sharing_M3STUART_desc:0 "Request access to the M3 Stuart Light Tank technical specifications and design documents from the United States."
 IOG_USA_tank_sharing_M3STUART_tt:0 "Gives access to the §YM3 Stuart§! technical package."
 
 IOG_USA_tank_sharing_M5STUART:0 "M5 Stuart Technical Package"
 IOG_USA_tank_sharing_M5STUART_desc:0 "Request access to the M5 Stuart Light Tank technical specifications and design documents from the United States."
 IOG_USA_tank_sharing_M5STUART_tt:0 "Gives access to the §YM5 Stuart§! technical package."
 
 IOG_USA_tank_sharing_M24CHAFFEE:0 "M24 Chaffee Technical Package"
 IOG_USA_tank_sharing_M24CHAFFEE_desc:0 "Request access to the M24 Chaffee Light Tank technical specifications and design documents from the United States."
 IOG_USA_tank_sharing_M24CHAFFEE_tt:0 "Gives access to the §YM24 Chaffee§! technical package."
 
 IOG_USA_tank_sharing_M18HELLCAT:0 "M18 Hellcat Technical Package"
 IOG_USA_tank_sharing_M18HELLCAT_desc:0 "Request access to the M18 Hellcat Tank Destroyer technical specifications and design documents from the United States."
 IOG_USA_tank_sharing_M18HELLCAT_tt:0 "Gives access to the §YM18 Hellcat§! technical package."
 
 IOG_USA_tank_sharing_M2MED:0 "M2 Medium Tank Technical Package"
 IOG_USA_tank_sharing_M2MED_desc:0 "Request access to the M2 Medium Tank technical specifications and design documents from the United States."
 IOG_USA_tank_sharing_M2MED_tt:0 "Gives access to the §YM2 Medium Tank§! technical package."
 
 IOG_USA_tank_sharing_M3LEE:0 "M3 Lee Technical Package"
 IOG_USA_tank_sharing_M3LEE_desc:0 "Request access to the M3 Lee Medium Tank technical specifications and design documents from the United States."
 IOG_USA_tank_sharing_M3LEE_tt:0 "Gives access to the §YM3 Lee§! technical package."
 
 IOG_USA_tank_sharing_M4SHERMAN:0 "M4 Sherman Technical Package"
 IOG_USA_tank_sharing_M4SHERMAN_desc:0 "Request access to the M4 Sherman Medium Tank technical specifications and design documents from the United States."
 IOG_USA_tank_sharing_M4SHERMAN_tt:0 "Gives access to the §YM4 Sherman§! technical package."
 
 IOG_USA_tank_sharing_M4HVSS:0 "M4 HVSS Technical Package"
 IOG_USA_tank_sharing_M4HVSS_desc:0 "Request access to the M4 HVSS (Horizontal Volute Spring Suspension) technical specifications and design documents from the United States."
 IOG_USA_tank_sharing_M4HVSS_tt:0 "Gives access to the §YM4 HVSS§! technical package."
 
 IOG_USA_tank_sharing_M4JUMBO:0 "M4 Jumbo Technical Package"
 IOG_USA_tank_sharing_M4JUMBO_desc:0 "Request access to the M4 Jumbo assault tank technical specifications and design documents from the United States."
 IOG_USA_tank_sharing_M4JUMBO_tt:0 "Gives access to the §YM4 Jumbo§! technical package."
 
 IOG_USA_tank_sharing_M26PERSHING:0 "M26 Pershing Technical Package"
 IOG_USA_tank_sharing_M26PERSHING_desc:0 "Request access to the M26 Pershing Heavy Tank technical specifications and design documents from the United States."
 IOG_USA_tank_sharing_M26PERSHING_tt:0 "Gives access to the §YM26 Pershing§! technical package."
 
 IOG_USA_tank_sharing_T26E4SuperPershing:0 "T26E4 Super Pershing Technical Package"
 IOG_USA_tank_sharing_T26E4SuperPershing_desc:0 "Request access to the T26E4 Super Pershing technical specifications and design documents from the United States."
 IOG_USA_tank_sharing_T26E4SuperPershing_tt:0 "Gives access to the §YT26E4 Super Pershing§! technical package."
 
 IOG_USA_tank_sharing_M6CHASSIS:0 "M6 Heavy Tank Technical Package"
 IOG_USA_tank_sharing_M6CHASSIS_desc:0 "Request access to the M6 Heavy Tank chassis technical specifications and design documents from the United States."
 IOG_USA_tank_sharing_M6CHASSIS_tt:0 "Gives access to the §YM6 Heavy Tank§! technical package."
 
 IOG_USA_tank_sharing_T29CHASSIS:0 "T29 Heavy Tank Technical Package"
 IOG_USA_tank_sharing_T29CHASSIS_desc:0 "Request access to the T29 Heavy Tank chassis technical specifications and design documents from the United States."
 IOG_USA_tank_sharing_T29CHASSIS_tt:0 "Gives access to the §YT29 Heavy Tank§! technical package."
 
 IOG_USA_tank_sharing_T28CHASSIS:0 "T28 Super Heavy Tank Technical Package"
 IOG_USA_tank_sharing_T28CHASSIS_desc:0 "Request access to the T28 Super Heavy Tank chassis technical specifications and design documents from the United States."
 IOG_USA_tank_sharing_T28CHASSIS_tt:0 "Gives access to the §YT28 Super Heavy Tank§! technical package."
 form_polynesia_category:0 "Form Polynesia"
 form_polynesia_category_desc:0 "New Zealand can integrate Pacific territories under our control to form a greater Polynesian nation."
 
 NZL_IOG_integrate_territory:0 "Integrate [FROM.GetName]"
 NZL_IOG_integrate_territory_desc:0 "By integrating [FROM.GetName] into New Zealand, we will strengthen our position in the Pacific and expand our influence across the region. The process will require administrative effort and resources, but will ultimately make this territory a core part of our nation."
 ##Ideas
 NZL_IOG_the_land_girls_idea:0 "The Women's Land Service"
 NZL_IOG_the_land_girls_idea_desc:0 "Women across New Zealand have answered the call to work the land while our men serve overseas. The Women's Land Service provides vital agricultural labor, ensuring our farms remain productive throughout the war."

 NZL_IOG_empire_air_training_scheme_idea:0 "Empire Air Training Scheme"
 NZL_IOG_empire_air_training_scheme_idea_desc:0 "New Zealand has become a vital training ground for Commonwealth aircrew under the Empire Air Training Scheme. Our facilities train thousands of pilots, navigators, and air gunners from across the Commonwealth, contributing to Allied air superiority while building our own aviation expertise."

 NZL_IOG_supporting_the_RAF_idea:0 "Supporting the RAF"
 NZL_IOG_supporting_the_RAF_idea_desc:0 "New Zealand pilots and aircrew serve with distinction in Royal Air Force squadrons across multiple theatres of war. Their skill and bravery in defending Britain and striking at the enemy brings honor to New Zealand while strengthening the bonds between our nations."
 
 
 ##MIO
 auckland_university_concern:0 "Auckland University"
 auckland_university_concern_desc:0 "The Auckland University has expressed concerns about the government's focus on wartime production and its impact on academic research and education. They fear that the war effort may divert resources away from important scientific advancements and the education of future generations."

 NZL_massey_university_concern:0 "Massey University"
 NZL_massey_university_concern_desc:0 "Massey University has raised concerns about the government's mobilization of the workforce and its impact on the agricultural sector. They worry that the focus on industrial production may lead to labor shortages on farms, affecting food production and rural communities."

 NZL_colonial_amunitions_company:0 "Colonial Ammunition Company"
 NZL_colonial_amunitions_company_desc:0 "The Colonial Ammunition Company has expressed concerns about the government's control over industrial production and its impact on their operations. They fear that government intervention may lead to inefficiencies and hinder their ability to meet the demands of wartime production."

 NZL_ford_munitions_company:0 "Ford Munitions Company"
 NZL_ford_munitions_company_desc:0 "The Ford Munitions Company has raised concerns about the government's economic stabilization measures and their impact on their business. They worry that price controls and wage regulations may limit their profitability and ability to invest in future growth."

 NZL_refining_nz:0 "National Refining Company"
 NZL_refining_nz_desc:0 "The National Refining Company has expressed concerns about the government's mobilization of the workforce and its impact on their operations. They fear that labor shortages and government intervention may hinder their ability to meet the demands of wartime production and maintain their position in the industry."

#Characters
 NZL_bill_barnard:0 "Bill Barnard"
 NZL_john_a_lee:0 "John A. Lee"

 ##Post-Capitulation Focuses
 NZL_government_in_exile:0 "Government in Exile"
 NZL_government_in_exile_desc:0 "Though our homeland has fallen, the legitimate government of New Zealand endures. From abroad, we shall maintain our democratic institutions and continue the fight for our nation's liberation. Peter Fraser and the Labour government remain committed to restoring New Zealand's freedom."
 NZL_government_in_exile_tt:0 "New Zealand establishes a legitimate government in exile to continue the struggle."

 NZL_maintain_democratic_legitimacy:0 "Maintain Democratic Legitimacy"
 NZL_maintain_democratic_legitimacy_desc:0 "Even in exile, we must uphold the democratic principles that define New Zealand. By continuing parliamentary procedures, maintaining regular elections among our expatriate community, and honoring the rule of law, we demonstrate that our government remains the rightful voice of the New Zealand people."
 NZL_maintain_democratic_legitimacy_tt:0 "Our commitment to democracy strengthens our claim as New Zealand's legitimate government."

 NZL_strengthen_commonwealth_bonds_exile:0 "Strengthen Commonwealth Bonds"
 NZL_strengthen_commonwealth_bonds_exile_desc:0 "In our darkest hour, we turn to our Commonwealth brethren. Britain, Australia, and Canada have stood by us before, and together we shall see New Zealand restored. Our bonds of shared history, culture, and democratic values make us stronger together than apart."
 NZL_strengthen_commonwealth_bonds_exile_tt:0 "Deepening ties with Commonwealth nations provides support for our government in exile."

 NZL_appeal_to_america:0 "Appeal to America"
 NZL_appeal_to_america_desc:0 "The United States has emerged as the arsenal of democracy. We must appeal to American sympathy and strategic interests in the Pacific. New Zealand's liberation is not only about our small nation—it is about preserving freedom and democratic governance across the Pacific region."
 NZL_appeal_to_america_tt:0 "American support could prove decisive in liberating our homeland."

 NZL_recruit_exiled_volunteers:0 "Recruit Exiled Volunteers"
 NZL_recruit_exiled_volunteers_desc:0 "Thousands of New Zealanders abroad burn with desire to liberate their homeland. From London to Sydney, from Canada to the Middle East, our expatriates and servicemen volunteer to form new units. The spirit of the ANZAC lives on in these brave souls who refuse to accept defeat."
 NZL_recruit_exiled_volunteers_tt:0 "New Zealanders abroad rally to the cause of liberation."

 NZL_support_resistance_at_home:0 "Support the Resistance at Home"
 NZL_support_resistance_at_home_desc:0 "Though we are far from home, we shall not abandon our people to occupation. Through covert channels, we will supply resistance fighters, broadcast messages of hope, and coordinate sabotage efforts. The enemy may control our land, but they will never control the hearts of New Zealanders."
 NZL_support_resistance_at_home_tt:0 "Supporting resistance movements undermines enemy control of New Zealand."

 NZL_preserve_our_culture:0 "Preserve Our Culture"
 NZL_preserve_our_culture_desc:0 "In exile, we face the danger of losing our national identity. We must actively preserve New Zealand's unique culture—both Pākehā and Māori traditions. Cultural societies, schools teaching our history, and events celebrating our heritage will keep the spirit of New Zealand alive until we return."
 NZL_preserve_our_culture_tt:0 "Maintaining our cultural identity strengthens resolve among exiled New Zealanders."

 NZL_plan_the_liberation:0 "Plan the Liberation"
 NZL_plan_the_liberation_desc:0 "The time will come when we return to our shores. Our military staff must prepare detailed plans for New Zealand's liberation—identifying key strategic points, coordinating with Allied forces, and preparing for the landing operations that will restore our nation's freedom."
 NZL_plan_the_liberation_tt:0 "Detailed planning prepares our forces for the eventual liberation of New Zealand."

 NZL_rebuild_the_forces:0 "Rebuild the Forces"
 NZL_rebuild_the_forces_desc:0 "With Allied support, we shall rebuild the New Zealand forces. New divisions will be trained, equipped, and prepared for the liberation campaign. Though we fight far from home, every soldier knows that their ultimate mission is to march once more on New Zealand soil as liberators."
 NZL_rebuild_the_forces_tt:0 "Allied support enables us to rebuild our military forces for liberation."

 NZL_never_surrender:0 "Never Surrender"
 NZL_never_surrender_desc:0 "The enemy thought they could break the spirit of New Zealand by occupying our islands. They were wrong. From exile, we declare our unshakeable resolve: we shall never surrender, never compromise, never accept defeat. New Zealand will be free again, and those who fight for that freedom will not rest until it is achieved."
 NZL_never_surrender_tt:0 "The indomitable spirit of New Zealand inspires all who fight for liberation."

 ##Post-Capitulation Ideas
 NZL_exiled_volunteers:0 "Exiled Volunteers"
 NZL_exiled_volunteers_desc:0 "New Zealanders from across the globe have volunteered to serve in our armed forces, determined to liberate their homeland from occupation."

 NZL_liberation_planning:0 "Liberation Planning"
 NZL_liberation_planning_desc:0 "Detailed operational plans for New Zealand's liberation have been developed, coordinating our forces with Allied strategy."

 NZL_never_surrender_spirit:0 "Never Surrender"
 NZL_never_surrender_spirit_desc:0 "The people of New Zealand, both at home and in exile, have vowed never to accept defeat. This unbreakable spirit drives our struggle for liberation."

 ##Air Force Focuses
 NZL_royal_new_zealand_air_force:0 "Royal New Zealand Air Force"
 NZL_royal_new_zealand_air_force_desc:0 "The Royal New Zealand Air Force, established as an independent service in 1937, must be expanded and modernized to meet the challenges of modern aerial warfare. By investing in air bases, training facilities, and aircraft procurement, we will ensure that New Zealand commands the skies."

 NZL_expand_airfields:0 "Expand Airfields"
 NZL_expand_airfields_desc:0 "New Zealand's existing airfields are insufficient for a modern air force. By constructing new air bases and expanding existing facilities in Auckland, Wellington, and Christchurch, we will create the infrastructure needed to support large-scale air operations across the Pacific."

 NZL_empire_air_training_scheme:0 "Empire Air Training Scheme"
 NZL_empire_air_training_scheme_desc:0 "The Empire Air Training Scheme represents a Commonwealth-wide effort to train pilots, navigators, and aircrew for the war effort. New Zealand's geographic isolation and good weather make it ideal for flight training. We will establish training facilities that will produce thousands of skilled airmen for the Allied cause."

 NZL_fighters_for_the_rnzaf:0 "Fighters for the RNZAF"
 NZL_fighters_for_the_rnzaf_desc:0 "The RNZAF requires modern fighter aircraft to defend our skies and support our forces overseas. Whether purchasing British Hurricanes and Spitfires or securing American P-40 Kittyhawks, we must equip our pilots with fighters capable of matching enemy aircraft in combat."

 NZL_support_the_raf:0 "Support the RAF"
 NZL_support_the_raf_desc:0 "New Zealand pilots have earned a reputation as skilled and courageous aviators. By sending our best pilots to serve with the Royal Air Force, we contribute to the defense of Britain while gaining invaluable combat experience that will benefit the RNZAF."

 NZL_battle_of_britain_volunteers:0 "Battle of Britain Volunteers"
 NZL_battle_of_britain_volunteers_desc:0 "As the Luftwaffe threatens Britain's survival, New Zealand pilots volunteer to defend the skies above England. Our airmen will fight alongside British, Polish, and Commonwealth pilots in the desperate aerial battle that will determine the fate of the free world."

 NZL_pacific_air_operations:0 "Pacific Air Operations"
 NZL_pacific_air_operations_desc:0 "The vast distances of the Pacific theatre demand specialized air operations. From reconnaissance flights over thousands of miles of ocean to strikes against Japanese bases across the Pacific islands, the RNZAF must prepare for the unique challenges of aerial warfare in our region."

 NZL_flying_boat_operations:0 "Flying Boat Operations"
 NZL_flying_boat_operations_desc:0 "Flying boats like the Short Sunderland and Catalina are essential for Pacific operations. These long-range aircraft can patrol vast ocean areas, conduct search and rescue missions, and strike enemy shipping far from conventional airbases. Establishing flying boat squadrons will extend New Zealand's reach across the Pacific."

 NZL_bombers_for_the_rnzaf:0 "Bombers for the RNZAF"
 NZL_bombers_for_the_rnzaf_desc:0 "While fighters defend our skies, bombers carry the war to the enemy. Whether light bombers for tactical support or heavy bombers for strategic strikes, the RNZAF needs a diverse bomber fleet capable of attacking enemy positions, shipping, and infrastructure across the Pacific."

 NZL_air_supremacy_in_pacific:0 "Air Supremacy in the Pacific"
 NZL_air_supremacy_in_pacific_desc:0 "Achieving air supremacy over the Pacific is essential for victory against Japan. By coordinating our fighter and bomber forces, establishing forward air bases, and training our pilots in aggressive tactics, we will dominate the skies and support Allied operations throughout the Pacific theatre."

 NZL_air_doctrine_development:0 "Air Doctrine Development"
 NZL_air_doctrine_development_desc:0 "Experience gained in Europe and the Pacific must be incorporated into comprehensive air doctrine. From fighter tactics learned over Britain to long-range patrol procedures developed in the Pacific, we will codify the lessons of war into doctrine that will make the RNZAF more effective."

 NZL_modern_fighter_aircraft:0 "Modern Fighter Aircraft"
 NZL_modern_fighter_aircraft_desc:0 "As the war progresses, earlier fighter designs become obsolete. New Zealand must secure the most advanced fighter aircraft available—whether late-model Spitfires, American P-51 Mustangs, or even experimental jet fighters. Our pilots deserve the best aircraft we can provide."

 NZL_strategic_bombing_campaign:0 "Strategic Bombing Campaign"
 NZL_strategic_bombing_campaign_desc:0 "Strategic bombing can cripple enemy industry and break their will to fight. While New Zealand's primary focus is the Pacific, our bombers can contribute to strategic bombing campaigns against Japanese industrial centers, oil refineries, and military installations, hastening the enemy's defeat."

###kihfas

l_english:
 NZL_kihfas_army_dynamic_modifier:0 "New Zealand Army"
 NZL_modify_the_army_dynamic_modifier_tt:0 "Modify §Y$NZL_kihfas_army_dynamic_modifier$§! by:" 
 ##Focuses
 NZL_army_reforms:0 "Army Reforms"
 NZL_army_reforms_desc:0 "The New Zealand Army must undergo comprehensive modernization to meet the challenges of modern warfare. By reorganizing command structures, improving training facilities, and adopting new tactical doctrines, we will create a more efficient and capable fighting force ready for any theater of war."

 NZL_great_war_tactics:0 "Great War Tactics"
 NZL_great_war_tactics_desc:0 "While the Great War is behind us, the lessons learned in the trenches of Gallipoli and the Western Front remain valuable. By studying and adapting these hard-won tactical lessons—combined arms coordination, effective use of cover, and the importance of supporting fire—we will enhance our infantry's effectiveness. These time-tested tactics will serve as the foundation for training elite soldiers capable of excelling in any combat environment."

 NZL_tank_focus:0 "Armored Doctrine"
 NZL_tank_focus_desc:0 "While New Zealand has traditionally focused on infantry, the modern battlefield demands armored support. By establishing an armored doctrine, we will integrate tank production and mechanized tactics into our military strategy, ensuring our forces can compete with the armor of larger nations."
 
 NZL_adapt_to_african_terrain:0 "Desert Adaptation"
 NZL_adapt_to_african_terrain_desc:0 "New Zealand forces are likely to fight alongside Commonwealth troops in North Africa. We must adapt our training, equipment, and tactics for desert warfare—teaching our men to fight in extreme heat, navigate vast expanses of sand, and maintain vehicles in harsh desert conditions that would cripple unprepared units."

 NZL_jungle_fighting:0 "Jungle Warfare"
 NZL_jungle_fighting_desc:0 "The Pacific theatre presents unique challenges with its dense jungle terrain. Our troops must learn to fight in limited visibility, high humidity, and thick vegetation. Specialized jungle warfare training will prepare our forces for the brutal fighting expected against Japanese forces across the Pacific islands."

 NZL_tank_focus_offense:0 "Heavy Assault Armor Doctrine"
 NZL_tank_focus_offense_desc:0 "Offensive armor doctrine emphasizes breakthrough tactics and concentrated firepower. By focusing on harder-hitting tanks with superior guns and thicker armor, our armored units will excel at shattering enemy defensive lines and exploiting penetrations deep into enemy territory."

 NZL_tank_focus_speed:0 "Fast Mobile Armor Doctrine"
 NZL_tank_focus_speed_desc:0 "Speed and maneuverability are paramount in modern armored warfare. Rather than heavy assault tanks, we will focus on fast, mobile armor capable of rapid exploitation, flanking maneuvers, and the kind of fluid warfare that can outpace and encircle slower enemy formations."

 NZL_quantity_is_king:0 "Mass Production"
 NZL_quantity_is_king_desc:0 "Quality matters, but on the modern battlefield, quantity has a quality all its own. By expanding our railway workshops and streamlining production processes, we can mass-produce reliable armored vehicles. Overwhelming numbers will compensate for any technological shortcomings against enemy armor."

 NZL_tank_research:0 "Advanced Armor Development Program"
 NZL_tank_research_desc:0 "Investment in armored vehicle research will yield dividends across all aspects of tank design. From improved engines and transmissions to better armor composition and gun design, systematic research will ensure our tanks remain competitive with those of the major powers."

 NZL_shefield_tank_res:0 "Sheffield Tank Research"
 NZL_shefield_tank_res_desc:0 "The Sheffield light tank represents New Zealand's first serious domestic tank design. Based on proven Commonwealth designs but adapted for our specific needs and manufacturing capabilities, the Sheffield will provide our armored units with a reliable, locally-produced platform for future development."

 NZL_strong_infantry:0 "Elite Infantry Training Program"
 NZL_strong_infantry_desc:0 "Infantry remains the backbone of any army, and New Zealand has always produced exceptional foot soldiers. By focusing on elite infantry training, improved small arms proficiency, and specialized combat techniques, we will forge infantry units capable of holding their own against any enemy in the world."

 NZL_inland_special_forces:0 "Inland Special Forces Prioritization"
 NZL_inland_special_forces_desc:0 "New Zealand's rugged terrain has always bred hardy soldiers comfortable in mountains and rough country. By formalizing this into specialized ranger and mountaineer units, we will create elite formations capable of operating in the most challenging inland terrain—from the Alps of Europe to the mountains of Greece and beyond."

 NZL_marine_special_forces:0 "Marine Special Forces Prioritization"
 NZL_marine_special_forces_desc:0 "As an island nation with a proud naval tradition, New Zealand must excel at amphibious warfare. Specialized marine units trained in beach assaults, ship-to-shore operations, and coastal raiding will prove invaluable in the Pacific theatre and any amphibious operations alongside our Commonwealth allies."

 NZL_owen_gun_stuff:0 "Owen Gun Development"
 NZL_owen_gun_stuff_desc:0 "The Owen submachine gun, though originally Australian, represents the kind of simple, reliable automatic weapon ideal for colonial production. By licensing or developing similar designs, we can equip our troops with modern automatic weapons without relying entirely on imports from Britain or America."

 NZL_home_defense:0 "Fortress New Zealand Initiative"
 NZL_home_defense_desc:0 "While our finest soldiers fight abroad, New Zealand itself must remain defended. By establishing comprehensive home defense plans, fortifying key positions, and training troops specifically for defending our core territory, we ensure that our islands remain secure against any potential invasion threat."

 NZL_maori_batalion:0 "Maori Battalion"
 NZL_maori_batalion_desc:0 "The Māori people have a proud warrior tradition and have proven themselves formidable soldiers. By forming dedicated Māori battalions, we honor this heritage while creating elite fighting units. The Māori Battalion will become legendary for its courage, ferocity, and effectiveness in combat, earning respect from both allies and enemies."

 NZL_expand_maori_influence:0 "Expand Maori Influence"
 NZL_expand_maori_influence_desc:0 "The success of Māori military units demonstrates the value of indigenous soldiers. By expanding Māori recruitment and incorporating Māori tactical traditions and fighting spirit throughout the army, we will strengthen our entire military while promoting greater unity between Māori and Pākehā New Zealanders."

 NZL_bob_semple_tank:0 "Bob Semple Tank"
 NZL_bob_semple_tank_desc:0 "Minister Bob Semple's improvised tank design may lack sophistication, but it represents New Zealand's determination to defend itself with whatever resources are available. Built on tractor chassis and armed with machine guns, these makeshift armored vehicles will provide mobile firepower for home defense when nothing else is available."

 NZL_expand_bob_semple:0 "Bob Semple Expansion"
 NZL_expand_bob_semple_desc:0 "While the Bob Semple tank will never match proper military armor, improvements can be made. By refining the design, improving armor protection, and establishing proper production facilities, we can create a more effective improvised armored vehicle for home defense and training purposes."

 NZL_citizen_militia_forces:0 "Citizen Militia Forces"
 NZL_citizen_militia_forces_desc:0 "With our regular army deployed overseas, New Zealand must rely on citizen militias for home defense. By organizing, training, and equipping volunteer militia units in every town and district, we create a defensive network that will make any invasion of our islands a costly and difficult undertaking."

 NZL_inf_research:0 "Infantry Weapons Development"
 NZL_inf_research_desc:0 "The individual soldier is only as effective as his weapons. Investment in infantry weapons research will yield improvements in rifles, machine guns, mortars, and grenades—ensuring our foot soldiers possess the firepower to match or exceed any enemy infantry they encounter on the battlefield."

 NZL_arti_research:0 "Artillery Modernisation Program"
 NZL_arti_research_desc:0 "Artillery remains the king of battle, delivering devastating firepower that can shatter enemy formations and fortifications. By investing in artillery research, we will develop more powerful guns, improved ammunition, and better fire control systems that will make our artillery units a decisive force on any battlefield."
 
 NZL_turret_expansion:0 "Advanced Light Tank Turret Research"
 NZL_turret_expansion_desc:0 "Modern tank warfare demands superior turret design. By researching advanced light tank turrets with improved gun mounting, better armor protection, and enhanced crew ergonomics, we will give our tankers the tools they need to engage and destroy enemy armor effectively."

 NZL_train_generals:0 "Innovative Armor Tactics"
 NZL_train_generals_desc:0 "Armored warfare is as much about leadership as it is about tanks. By training our generals in innovative armor tactics—from blitzkrieg-style breakthroughs to defensive armor employment—we will create commanders who can employ our armored forces with maximum effectiveness, turning tank units into decisive battlefield weapons."

 NZL_chariot_of_victory:0 "Chariot of Victory"
 NZL_chariot_of_victory_desc:0 "The tank is the modern chariot of victory—a weapon that can break enemy lines, exploit breakthroughs, and carry our forces to triumph. By embracing this revolutionary weapon and developing comprehensive armored warfare doctrine, New Zealand will field tank forces capable of delivering decisive victories on any battlefield. Our armored chariots will lead the way to victory."

 NZL_at_research:0 "Advanced Anti-Tank Weapons Program"
 NZL_at_research_desc:0 "As armored warfare evolves, so must anti-tank weapons. Investment in anti-tank research will produce more powerful anti-tank guns capable of defeating the thickest enemy armor. From improved ammunition to better gun designs, our anti-tank capabilities will ensure enemy armor cannot operate with impunity."

 NZL_commandos:0 "New Zealand Commando Brigade"
 NZL_commandos_desc:0 "Elite commando units represent the pinnacle of infantry training and capability. By establishing specialized commando training programs, we will create small units of exceptional soldiers capable of conducting raids, reconnaissance, and special operations far behind enemy lines—missions that regular infantry could never accomplish."

 NZL_superior_firepower:0 "Superior Firepower"
 NZL_superior_firepower_desc:0 "Modern warfare is won by firepower. By emphasizing artillery support, combined arms tactics, and overwhelming enemy positions with superior firepower before assault, we will minimize our casualties while maximizing enemy losses. Concentrated firepower will be the cornerstone of our military doctrine."

 NZL_lower_age_of_conscription:0 "Lower The Minimum Conscription Age"
 NZL_lower_age_of_conscription_desc:0 "As the war intensifies, New Zealand needs more soldiers. By lowering the minimum age of conscription, we can expand our manpower pool significantly. While younger soldiers may lack experience, they make up for it with enthusiasm and can be trained into effective fighting men when the nation's survival is at stake."

 NZL_heavy_artillery_gamble:0 "Heavy Artillery Investments"
 NZL_heavy_artillery_gamble_desc:0 "Heavy artillery can pulverize the strongest fortifications and break the most determined enemy formations. By investing in heavy artillery research and production, we are making a calculated gamble—trading mobility for devastating firepower that can decide battles before our infantry even advances."
