 #mio traits
 NZL_mio_trait_owen_gun:0 "Owen Gun Research"

 nzl_mio_trait_chariot_of_victory:0 "Chariot of Victory"
 nzl_mio_trait_chariot_of_victory_desc:0 "Our industrial organizations have embraced the concept of the tank as the modern chariot of victory, prioritizing armor development and production efficiency to field superior armored forces."

 nzl_mio_trait_lightning_warfare:0 "Lightning Warfare"
 nzl_mio_trait_lightning_warfare_desc:0 "Focusing on speed and mobility, our tank designs emphasize rapid maneuver warfare. Lighter armor and more powerful engines enable our tanks to strike like lightning—fast, devastating, and before the enemy can react."

 nzl_mio_trait_thunder_warfare:0 "Thunder Warfare"
 nzl_mio_trait_thunder_warfare_desc:0 "Like rolling thunder, our heavy armor doctrine emphasizes overwhelming firepower and thick armor protection. These tanks may be slower, but they hit with the force of thunder and can withstand tremendous punishment while breaking through enemy defenses."


 NZL_desert_tt:0 "Depending on your chosen path, you will either recieve §0Desert Terrain Bonuses§! for inf and SF or to tanks!"
 NZL_jgl_tt:0 "Depending on your chosen path, you will either recieve §0Jungle Terrain Bonuses§! for inf and SF or to tanks!"

 ##Artillery and Mountain Warfare
 NZL_heavy_artillery:0 "Heavy Artillery"
 NZL_heavy_artillery_desc:0 "Heavy artillery provides devastating firepower capable of destroying fortifications and breaking enemy defensive positions. By investing in heavy artillery pieces and training specialized crews, we will give our forces the firepower needed to support major offensive operations."

 NZL_mountain_artillery:0 "Mountain Artillery"
 NZL_mountain_artillery_desc:0 "New Zealand's mountainous terrain and the likelihood of fighting in places like Greece and Italy require specialized mountain artillery. These lighter, more portable guns can be disassembled and carried through difficult terrain where conventional artillery cannot go, providing vital fire support for mountain infantry."

 NZL_further_modernisation_of_mountain_artillery:0 "Further Modernisation of Mountain Artillery"
 NZL_further_modernisation_of_mountain_artillery_desc:0 "Our initial mountain artillery designs can be improved with modern recoil systems, better metallurgy, and enhanced range. By continuing to develop these specialized weapons, we will ensure our mountain troops have the best possible fire support in the world's most challenging terrain."

 NZL_siege_batteries:0 "Siege Batteries"
 NZL_siege_batteries_desc:0 "Fortified positions and heavily defended coastal installations require specialized siege artillery. By establishing siege batteries equipped with the heaviest guns available, we will provide the capability to reduce enemy fortifications that would otherwise require costly infantry assaults."

 nzl_mio_mountain_gun:0 "Mountain Gun Development"
 nzl_mio_mountain_gun_desc:0 "Development of specialized mountain guns requires close cooperation between our military industrial organizations and field commanders. These lightweight, packable artillery pieces will revolutionize our mountain warfare capabilities."

 nzl_mio_further_modernisation_of_mountain_gun:0 "Advanced Mountain Gun Systems"
 nzl_mio_further_modernisation_of_mountain_gun_desc:0 "Further refinement of mountain gun technology will produce even more effective weapons. Improved traverse mechanisms, better sights, and enhanced ammunition will make our mountain artillery the finest in the world."

 nzl_mio_heavy_artillery_modernisation:0 "Heavy Artillery Modernisation"
 nzl_mio_heavy_artillery_modernisation_desc:0 "Our military industrial organizations are working to modernize heavy artillery designs with improved breech mechanisms, superior metallurgy, and enhanced fire control systems. These advances will significantly increase the range, accuracy, and reliability of our heavy guns."

 ##Marine and Amphibious Warfare
 NZL_support_the_marines:0 "Support the Marines"
 NZL_support_the_marines_desc:0 "Amphibious operations require specialized marine infantry trained for beach assaults and ship-to-shore combat. By establishing dedicated marine training programs and providing specialized equipment, we will create elite units capable of conducting the toughest amphibious operations in the Pacific."

 NZL_coastal_assault_doctrine:0 "Coastal Assault Doctrine"
 NZL_coastal_assault_doctrine_desc:0 "Amphibious warfare requires unique tactics different from conventional land combat. By developing comprehensive coastal assault doctrine covering everything from beach reconnaissance to coordinated naval gunfire support, we will maximize the effectiveness of our amphibious operations."

 NZL_urban_warfare_training:0 "Urban Warfare Training"
 NZL_urban_warfare_training_desc:0 "Modern warfare increasingly takes place in cities and towns where conventional tactics prove ineffective. By training our troops in urban warfare—house-to-house fighting, street clearing, and close-quarters combat—we prepare them for the brutal reality of fighting in built-up areas."

 NZL_amphibious_equipment_production:0 "Amphibious Equipment Production"
 NZL_amphibious_equipment_production_desc:0 "Successful amphibious operations require specialized equipment—landing craft, amphibious vehicles, waterproofed radios, and specialized engineering equipment. By establishing production facilities for amphibious warfare equipment, we ensure our forces have the tools needed for successful beach assaults."

 ##Mechanization and Armor
 NZL_mechanization_of_the_cavalry:0 "Mechanization of the Cavalry"
 NZL_mechanization_of_the_cavalry_desc:0 "The age of horse cavalry has passed. By mechanizing our cavalry units with armored cars, scout vehicles, and light tanks, we will create fast-moving reconnaissance and screening forces that combine the mobility of traditional cavalry with modern firepower and protection."

 NZL_mountain_tanks:0 "Mountain Tanks"
 NZL_mountain_tanks_desc:0 "Conventional tanks struggle in mountainous terrain, but specially designed mountain tanks with improved climbing ability, better traction, and lower ground pressure can operate where standard armor cannot. Developing these specialized vehicles will give our mountain infantry armored support in the most difficult terrain."

 ##Naval Focuses
 NZL_royal_new_zealand_navy:0 "Royal New Zealand Navy"
 NZL_royal_new_zealand_navy_desc:0 "The Royal New Zealand Navy must be expanded and modernized to defend our island nation and contribute to Allied naval operations across the Pacific. By investing in shipbuilding, training, and naval infrastructure, we will create a navy worthy of New Zealand's maritime heritage."

 NZL_expand_naval_infrastructure:0 "Expand Naval Infrastructure"
 NZL_expand_naval_infrastructure_desc:0 "New Zealand's naval infrastructure is insufficient for a modern fleet. By expanding dockyards, constructing repair facilities, and establishing supply depots, we will create the infrastructure needed to support a substantial naval force operating across the vast Pacific theatre."

 NZL_cruiser_squadron:0 "Cruiser Squadron"
 NZL_cruiser_squadron_desc:0 "Light cruisers represent the backbone of New Zealand's naval power. Ships like HMNZS Achilles and Leander have already proven their worth in combat. By expanding our cruiser squadron, we will give the RNZN the capability to conduct independent operations and support major fleet actions."

 NZL_rnzn_leander_class:0 "RNZN Leander-Class Operations"
 NZL_rnzn_leander_class_desc:0 "The Leander-class cruisers HMNZS Achilles and Leander form the core of New Zealand's naval power. These ships have already distinguished themselves in actions like the Battle of the River Plate. By optimizing their operations and ensuring proper support, we maximize their effectiveness."

 NZL_destroyer_flotilla:0 "Destroyer Flotilla"
 NZL_destroyer_flotilla_desc:0 "Destroyers are the workhorses of any modern navy—fast, versatile, and capable of anti-submarine warfare, convoy escort, and surface combat. By building up our destroyer flotilla, we will provide the RNZN with the versatile ships needed for the multitude of naval tasks in the Pacific."

 NZL_convoy_escort_doctrine:0 "Convoy Escort Doctrine"
 NZL_convoy_escort_doctrine_desc:0 "New Zealand's survival depends on secure sea lanes for trade and reinforcement. By developing comprehensive convoy escort doctrine and training our naval forces in anti-submarine tactics, we will protect the vital shipping routes that connect New Zealand to the world."

 NZL_devonport_naval_base:0 "Devonport Naval Base Expansion"
 NZL_devonport_naval_base_desc:0 "Devonport Naval Base in Auckland is the home of the Royal New Zealand Navy. By expanding its facilities, constructing modern workshops, and improving its dry dock capacity, we will create a world-class naval base capable of supporting major fleet operations."

 NZL_anti_submarine_warfare:0 "Anti-Submarine Warfare"
 NZL_anti_submarine_warfare_desc:0 "The submarine threat to our shipping lanes cannot be underestimated. By developing specialized anti-submarine warfare capabilities—including depth charges, sonar equipment, and ASW tactics—we will protect our merchant fleet and naval forces from undersea predators."

 NZL_submarine_program:0 "Submarine Program"
 NZL_submarine_program_desc:0 "While surface vessels have been our primary focus, submarines offer unique capabilities for naval warfare. By establishing a submarine program, we can develop undersea warfare capabilities for both defensive operations and offensive commerce raiding. Importing foreign submarine technology and developing submarine doctrine will give the RNZN a new dimension of naval power beneath the waves."
 NZL_import_submarine_technology:0 "Import Submarine Technology"
 NZL_commerce_attack:0 "Commerce Raiding Doctrine"

 NZL_naval_cooperation_with_rnzaf:0 "Naval Cooperation with RNZAF"
 NZL_naval_cooperation_with_rnzaf_desc:0 "Modern naval warfare requires close coordination between surface vessels and aircraft. By establishing joint training programs and communication protocols between the Royal New Zealand Navy and Air Force, we will create a integrated maritime force capable of dominating the Pacific."

 NZL_corvette_program:0 "Corvette Program"
 NZL_corvette_program_desc:0 "Corvettes are small, economical escort vessels ideal for convoy protection and coastal patrol. By establishing a corvette construction program, New Zealand can build up its escort force quickly and economically, providing numerous vessels to protect our vital sea lanes."

 NZL_pacific_fleet_integration:0 "Pacific Fleet Integration"
 NZL_pacific_fleet_integration_desc:0 "The Royal New Zealand Navy must be integrated into broader Allied Pacific Fleet operations. By coordinating with American, Australian, and British naval forces, we will ensure that New Zealand's naval power contributes effectively to the overall Allied strategy in the Pacific theatre."

 NZL_minesweeper_fleet:0 "Minesweeper Fleet"
 NZL_minesweeper_fleet_desc:0 "Naval mines pose a deadly threat to both military and civilian shipping. By establishing a dedicated minesweeper fleet, we will ensure that our ports and shipping lanes remain clear, and that New Zealand can support Allied mine-clearing operations throughout the Pacific."

 NZL_support_royal_navy_operations:0 "Support Royal Navy Operations"
 NZL_support_royal_navy_operations_desc:0 "The Royal Navy remains the world's most powerful naval force, and New Zealand's ships have a proud tradition of serving alongside British vessels. By formally integrating RNZN units into Royal Navy operations, we contribute to the broader Commonwealth naval effort while gaining invaluable experience."

 NZL_defend_the_sea_lanes:0 "Defend the Sea Lanes"
 NZL_defend_the_sea_lanes_desc:0 "The vast Pacific Ocean is crossed by vital shipping lanes that carry the trade, supplies, and reinforcements upon which New Zealand and our allies depend. By dedicating substantial naval resources to protecting these sea lanes, we ensure that the arteries of Allied power remain open."

 NZL_refitting_yards:0 "Naval Refitting Yards"
 NZL_refitting_yards_desc:0 "Ships require constant maintenance, repairs, and upgrades to remain combat-effective. By constructing modern refitting yards with the latest equipment and skilled workers, we will ensure that New Zealand's naval vessels and visiting Allied ships can be quickly repaired and returned to service."


