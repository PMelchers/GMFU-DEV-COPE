GER_speeches_category:0 "Public Speaking"
GER_speeches_category_desc:0 "The object of rhetoric is not truth, but persuasion. A man has made at least a start on discovering the meaning of human life when he plants shade trees under which he knows full well he will never sit. Therefore when at least one of the parties to a conflict wants something more than it wants peace, war is inevitable."
sp_ger_AH_occult.1:0 "Unlock the emotions of the German masses"
sp_ger_AH_occult.1_desc:0 ""We cannot give up what makes life worth living. It is worthwhile because ours is a great mission. This mission was not given to us by a worldly superior but by the God who created our nation!""
sp_ger_AH_occult.2:0 "Attend a party rally in Nuremberg"
sp_ger_AH_occult.2_desc:0 ""When our party consisted of only seven men it already had two principles. First, it wanted to be a party with a true ideology and it wanted to be the one and only power in Germany. The party is the selecting ground for German political leaders. It's doctrine will be unchangeable. It's organization will be hard as steel but it's tactics will be flexible. It's total image however, will be like a holy order! It is our wish that this State shall endure for thousands of years. We are happy to know that the future belongs to us completely! Long live National Socialism! Long live Germany!""
sp_essen_krupp:0 "Address Krupp Industries in Essen"
sp_essen_krupp_desc:0 ""I do not subordinate myself to the world, for it can not pass judgment on me! I only subordinate myself to you!""
sp_wien:0 "Greet the crowds at Heldenplatz"
sp_wien_desc:0 ""I hereby declare for this land its new mission. The oldest Ostmark of the German Volk shall from now on constitute the youngest bulwark of the German nation!""
sp_sudeten:0 "Address the Reichstag on the Sudeten Crisis"
sp_sudeten_desc:0 ""It is the business of the Czechoslovakian Government to come to terms with the true representatives of the Sudeten Germans and in one way or another, reach some form of understanding with them.""
sp_inaugurate_autobahn:0 "Inaugurate the Reichsautobahn"
sp_berlin_siemens:0 "Address workers at the Siemens factory in Berlin"
sp_berlin_siemens_desc:0 ""I grew up amongst you! I once stood amongst you! During the four years of war I was in your midst!""
sp_hitlerjugend:0 "Address the Hitlerjugend"
sp_hitlerjugend_desc:0 ""We want to see no more class divisions. You must not let this grow amongst you!""
sp_freemarket:0 "Denounce the free-market economy"
sp_freemarket_desc:0 ""The worst illusion is to believe that you can live on something that was not created and produced by work before.""
sp_falloffrance:0 "Address the Reichstag on the Fall of France"
sp_falloffrance_desc:0 ""Mr. Churchill should make an exception and place trust in me when as a prophet I now proclaim: a great empire will be destroyed! I am fully aware that the continuation of this war will end only in the complete shattering of one of the two warring parties. Mr. Churchill may believe this to be Germany. I know it to be England!""
declare_war_POL:0 "Announce the invasion of Poland"
declare_war_POL_desc:0 ""Provided all of us form part of this community, sworn together, determined never to capitulate, then our will shall master all need!""
declare_war_USA1:0 "Declare war on the United States"
declare_war_USA1_desc:0 ""Our opponents should not deceive themselves. In the two thousand years of recorded German history, our people have never been more determined and united than today. The Lord of the universe has been so generous to us in recent years that we bow in gratitude before a Providence that has permitted us to be members of such a great nation. We thank Him, that along with those in earlier and coming generations of the German nation, our deeds of honor may also be recorded in the eternal book of German history!""
declare_war_USA2:0 "Announce Germany's declaration of war against the United States"
declare_war_USA2_desc:0 ""Our opponents should not deceive themselves. In the two thousand years of recorded German history, our people have never been more determined and united than today. The Lord of the universe has been so generous to us in recent years that we bow in gratitude before a Providence that has permitted us to be members of such a great nation. We thank Him, that along with those in earlier and coming generations of the German nation, our deeds of honor may also be recorded in the eternal book of German history!""

###nigger###
sp_ger_totalwar:0 "Make a call for Total War"
sp_ger_totalwar_desc:0 ""The English say that Germans want capitulation, not Total War! Do you want Total War? Do you want it - if need be - more total and radical than anything we could even imagine today? I ask you: Are you determined to follow the Führer, to bring the war to a victorious conclusion, even if this means bearing the heaviest of personal burdens?! And so, from now on let our slogan be: Rise up people, and unleash the storm!""
Operation_Citadel:0 "Launch Operation "Unternehmen Zitadelle""
Operation_Citadel_desc:0 ""
Operation_Bagration:0 "Launch Operation "Bagration""
Operation_Bagration_desc:0 ""
declare_war_SOV:0 "Launch Operation "Unternehmen Blau""
declare_war_SOV_desc:0 ""Last Hope...""
Winter_Offensive:0 "Launch a Winter Offensive"
Winter_Offensive_desc:0 ""Za Rodina!""
SOV_speeches_category:0 "Stalin and his Aura"
SOV_speeches_category_desc:0 "Panic-makers and cowards must be exterminated on the spot. Not one step back without orders from higher command! Commanders, commissars and political workers who retreat from a combat position without orders from higher command are traitors to the Motherland"






ITA_speeches_category:0 "Public Speaking"
ITA_speeches_category_desc:0 "Of all the talents bestowed upon men, none is so precious as the gift of oratory. He who enjoys it wields a power more durable than that of a great king. He is an independent force in the world. Abandoned by his party, betrayed by his friends, stripped of his offices, whoever can command his power is still formidable."
ITA_med_security:0 "Promulgate Mediterranean Naval Ambitions"
ITA_med_security_desc:0 ""In the Italian diplomatic note, there were clearly defined the Italian problems towards France. Problems of a colonial kind. These problems have a name. They are called Tunis, Djibouti and Suez. The French government is fully free to refuse even the simple discussion of these problems - as it has done. Because the relations among states are relations of strength, and these relations of strength are the determinants of their policies. This is your day, your great day.. With your courage, your sacrifice and your strength you have given a mighty impulse to the wheel of history. Now I am asking; do you want honours? Rewards?! A comfortable life?! Does the impossible exist for you?! What are the three words forming our dogma? Believe, obey, fight! Well, comrades, these three words has been, are and always will be the secret of every victory!""
ITA_Rally:0 "Attend a Party Rally in Turin"
ITA_Rally_desc:0 ""The Fascist Party is an army. If you wish, it is an order. You enter only to serve and obey. We believe that Italy is growing under the guidance of Fascism. The revolutionary nature of fascism will help Italy fulfil her destiny amd achieve wealth, power and glory!""




GEN_speeches_category:0 "Public Speaking"
GEN_speeches_category_desc:0 "Of all the talents bestowed upon men, none is so precious as the gift of oratory. He who enjoys it wields a power more durable than that of a great king. He is an independent force in the world. Abandoned by his party, betrayed by his friends, stripped of his offices, whoever can command his power is still formidable."
sp_POL:0 "Reject German claims on Danzig & Poznan"
sp_POL_desc:0 ""Peace is a precious and a desirable thing. Our generation, bloodied in wars, certainly deserves peace. But peace, like almost all things of this world, has its price, a high but a measurable one. We in Poland do not know the concept of peace at any price. There is only one thing in the lives of men, nations and countries that is without price. That thing is honor!""
sp_SOV_patrioticwar:0 "Call for a Patriotic War"
sp_SOV_patrioticwar_desc:0 ""Comrades! Citizens! Brothers and sisters! Fighters of our Army and Navy! I am addressing you, my friends! Side by side with the Red Army, the entire soviet people are rising in defense of our native land. Above all, it is essential that our people, the Soviet people, understand the full immensity of the danger that threatens our country and abandon all complacency, all heedlessness, all those moods of peaceful constructive work. The enemy is cruel and implacable. He is out to seize our lands, watered with our sweat, to seize our grain and oil secured by our labour. All our work must be immediately reconstructed on a war footing, everything must be subordinated to the interests of the front and the task of organizing the demolition of the enemy. Our forces are numberless. The overweening enemy will soon learn this to his cost. All our forces for support of our heroic Red Army and our glorious Red navy! All forces of the people - for the demolition of the enemy! Forward, to our victory!""




ENG_speeches_category:0 "Public Speaking"
ENG_speeches_category_desc:0 "Of all the talents bestowed upon men, none is so precious as the gift of oratory. He who enjoys it wields a power more durable than that of a great king. He is an independent force in the world. Abandoned by his party, betrayed by his friends, stripped of his offices, whoever can command his power is still formidable."
sp_ENG_peaceforourtime:0 "Announce 'Peace for our time'"
sp_ENG_peaceforourtime_desc:0 ""The settlement of the Czechoslovakian problem, which has now been achieved is, in my view, only the prelude to a larger settlement in which all Europe may find peace. This morning I had another talk with the German Chancellor, Herr Hitler, and here is the paper which bears his name upon it as well as mine. Some of you, perhaps, have already heard what it contains but I would just like to read it to you: ... We regard the agreement signed last night and the Anglo-German Naval Agreement as symbolic of the desire of our two peoples never to go to war with one another again!""
sp_ENG_warwithGER:0 "Declare war on Germany"
sp_ENG_warwithGER_desc:0 ""This morning the British Ambassador in Berlin handed the German Government a final note stating that, unless we heard from them by 11 o'clock that they were prepared at once to withdraw their troops from Poland, a state of war would exist between us. I have to tell you now that no such undertaking has been received, and that consequently this country is at war with Germany.""
sp_ENG_bloodtoiltearssweat:0 "Hold 'Blood, Toil, Tears and Sweat' Speech"
sp_ENG_bloodtoiltearssweat_desc:0 ""I have nothing to offer but blood, toil, tears and sweat. You ask, what is our policy? I will say: It is to wage war, by sea, land and air, with all our might and all the strength that God can give us; to wage war against a monstrous tyranny, never surpassed in the dark and lamentable catalogue of human crime. That is our policy. You ask, what is our aim? I can answer in one word: Victory. Victory at all costs! Victory in spite of all terror! Victory, however long an hard the road may be, for without victory there is no survival.""
sp_ENG_fightonthebeaches:0 "Hold 'We Shall Fight on the Beaches' Speech"
sp_ENG_fightonthebeaches_desc:0 ""We shall go on to the end. We shall fight in France, we shall fight on the seas and oceans, we shall fight with growing confidence and growing strength in the air, we shall defend our island, whatever the cost may be. We shall fight on the beaches, we shall fight on the landing grounds, we shall fight in the fields and in the streets, we shall fight in the hills; we shall never surrender...""
sp_ENG_finesthour:0 "Hold 'This Was Their Finest Hour' Speech"
sp_ENG_finesthour_desc:0 ""Let us therefore beace ourselves to our duties, and so bear ourselves, that if the British Empire and its Commonwealth last for a thousand years, men will still say, This was their finest hour.""





USA_speeches_category:0 "Public Speaking"
USA_speeches_category_desc:0 "You can sway a thousand men by appealing to their prejudices quicker than you can convince one man by logic. The orator persuades by moral character when his speech is delivered in such a manner as to render him worthy of confidence albeit rhetoric makes use of nature’s secrets in the same way as painters who try to imitate it: their most beautiful work is false."
sp_USA_warwithJAP:0 "Hold 'A date that will live in infamy' Speech"
sp_USA_warwithJAP_desc:0 ""Yesterday, December 7th, 1941 - a date which will live in infamy - the United States of America was suddenly and deliberately attacked by naval and air forces of the Empire of Japan. The United States was at peace with that nation. And, at the solicitation of Japan, was still in conservation with it's government and it's emperor, looking towards the maintenance of peace in the Pacific. I ask that the Congress declare that since the unprovoked and dastardly attack by Japan on Sunday, 7 December 1941, a state of war has existed between the United States and the Japanese Empire.""





GEN_foreign_leader_announcements_category:0 "Foreign Leader Announcements"
sp_listen_SOV_patrioticwar:0 "Stalin calls for a Patriotic War"
sp_listen_SOV_patrioticwar_desc:0 ""Comrades! Citizens! Brothers and sisters! Fighters of our Army and Navy! I am addressing you, my friends! Side by side with the Red Army, the entire soviet people are rising in defense of our native land. Above all, it is essential that our people, the Soviet people, understand the full immensity of the danger that threatens our country and abandon all complacency, all heedlessness, all those moods of peaceful constructive work. The enemy is cruel and implacable. He is out to seize our lands, watered with our sweat, to seize our grain and oil secured by our labour. All our work must be immediately reconstructed on a war footing, everything must be subordinated to the interests of the front and the task of organizing the demolition of the enemy. Our forces are numberless. The overweening enemy will soon learn this to his cost. All our forces for support of our heroic Red Army and our glorious Red navy! All forces of the people - for the demolition of the enemy! Forward, to our victory!"\n- Joseph Stalin, Premier of the Soviet Union"
sp_listen_POL:0 "Poland rejects German ultimatum"
sp_listen_POL_desc:0 ""Peace is a precious and a desirable thing. Our generation, bloodied in wars, certainly deserves peace. But peace, like almost all things of this world, has its price, a high but a measurable one. We in Poland do not know the concept of peace at any price. There is only one thing in the lives of men, nations and countries that is without price. That thing is honor!" \n- Józef Beck, Polish diplomat"
sp_listen_USA_warJAP:0 "The United States declare war on Japan"
sp_listen_USA_warJAP_desc:0 ""Yesterday, December 7th, 1941 - a date which will live in infamy - the United States of America was suddenly and deliberately attacked by naval and air forces of the Empire of Japan. The United States was at peace with that nation. And, at the solicitation of Japan, was still in conservation with it's government and it's emperor, looking towards the maintenance of peace in the Pacific. I ask that the Congress declare that since the unprovoked and dastardly attack by Japan on Sunday, 7 December 1941, a state of war has existed between the United States and the Japanese Empire."\n- Franklin Delano Roosevelt, President of the United States"