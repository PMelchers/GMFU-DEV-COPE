l_english:
 NZL_transfer_the_new_zealand_division_ai:0 "Transfer the New Zealand Division"
 NZL_transfer_the_new_zealand_division_ai_desc:0 "The 2nd New Zealand Division has been mobilized for action, so we should send it where the fighting is. The NZ Division from the Great War was attached to the Mediterranean, and so will the new division."
 NZL_form_the_rnzn_ai:0 "Form the RNZN"
 NZL_form_the_rnzn_ai_desc:0 "Our once small coastal patrol has now grown to include ships that can operate independently from Royal Navy supervision. New Zealand will have its own navy."
 NZL_expand_devonport_naval_base_ai:0 "Expand Devonport Naval Base"
 NZL_expand_devonport_naval_base_ai_desc:0 "The Devonport Naval Base will be the headquarters for our navy, but it must be expanded to meet the new demands of total war."
 NZL_coastal_defense_ai:0 "Coastal Defense"
 NZL_coastal_defense_ai_desc:0 "New Zealand is an island nation, far from enemies, so we must be prepared for amphibious attack along our coastlines."
 NZL_destroyer_effort_ai:0 "Destroyer Effort"
 NZL_destroyer_effort_ai_desc:0 "With our small industrial base, destroyers are the most efficient way for New Zealand to project naval power. Patrol the coasts, intercept submarines, and set early warning pickets."
 NZL_submarine_effort_ai:0 "Submarine Effort"
 NZL_submarine_effort_ai_desc:0 "Since any invasion will have to come by sea, the wolves of the ocean can be strong line of defense. Stealthy and hunting in packs, a submarine fleet can protect our sea lanes."
 NZL_light_cruiser_effort_ai:0 "Light Cruiser Effort"
 NZL_light_cruiser_effort_ai_desc:0 "Mid-size ships are appropriate for a mid-size power. Light cruisers can pack a punch, but have the speed to escape major engagements if necessary."
 NZL_capital_ship_effort_ai:0 "Capital Ship Effort"
 NZL_capital_ship_effort_ai_desc:0 "If New Zealand is to have a first rate navy, it has to have first rate ships. We must invest in battleships and heavy cruisers."
 NZL_expand_the_nzpaf_ai:0 "Expand the NZPAF"
 NZL_expand_the_nzpaf_ai_desc:0 "The New Zealand Permanent Air Force needs new coastal patrol craft and naval bombers. Modern nations cannot neglect the air war,"
 NZL_form_the_rnzaf_ai:0 "Form the RNZAF"
 NZL_form_the_rnzaf_ai_desc:0 "The time has come to make the air force independent of the other combat arms. The Royal New Zealand Air Force will have its own command structure but co-operate closely with the Royal Air Force."
 NZL_fighter_focus_ai:0 "Fighter Focus"
 NZL_fighter_focus_ai_desc:0 "Fighters are effective at intercepting and escorting the bombers that will be the decisive weapon for our allies."
 NZL_bomber_focus_ai:0 "Bomber Focus"
 NZL_bomber_focus_ai_desc:0 "Light bombers can effectively protect our coastlines, and will be needed in the fight overseas against our enemies.."
 NZL_defend_our_islands_ai:0 "Defend Our Islands"
 NZL_defend_our_islands_ai_desc:0 "We must be prepared for attack on our island paradise from the sea. Naval bombers can intercept and attack landing craft or even target capital ships."
 NZL_modern_fighters_ai:0 "Modern Fighters"
 NZL_modern_fighters_ai_desc:0 "It is time to upgrade our fighter designs to faster craft with a longer range. Our allies have shown the way with some of the most advanced planes the world has ever seen."
 NZL_heavy_bombers_ai:0 "Heavy Bombers"
 NZL_heavy_bombers_ai_desc:0 "The war can only be won by striking at the heart of the enemy homeland. Heavy bombers are necessary to deal a devastating blow to enemy factories and cities."
 NZL_national_roads_board_ai:0 "National Roads Board"
 NZL_national_roads_board_ai_desc:0 "New Zealand's rough terrain has discouraged a coherent road building system, but we need to improve what we have in place. A highway system should be researched, roads should be paved, and new paths cut through the mountains."
 NZL_new_zealand_steel_ai:0 "New Zealand Steel"
 NZL_new_zealand_steel_ai_desc:0 "New Zealand has been blessed with abundant stores of ironsand, especially on the North Island. It takes a special process to extract ore from this sand, but it can serve as the cornerstone of our steel industry for years to come."
 NZL_taranaki_oil_ai:0 "Taranaki Oil"
 NZL_taranaki_oil_ai_desc:0 "The Taranaki region on the north island is rich in minerals and petroleum. Entrepreneurs have tried to exploit these oil reserves, but more investment is needed in refineries and drilling."
 NZL_wairarapa_sheep_farms_ai:0 "Wairarapa Sheep Farms"
 NZL_wairarapa_sheep_farms_ai_desc:0 "The wool industry of Wairarapa is one of the cornerstones of the New Zealand economy. As the world breaks out of its Depression, there will be greater demand for our wool."
 NZL_bureau_of_industry_ai:0 "Bureau of Industry"
 NZL_bureau_of_industry_ai_desc:0 "New Zealand is an agrarian society, with an emphasis on ranching. The Bureau of Industry must encourage great investment in capital infrastructure and manufacturing."
 NZL_department_of_scientific_and_industrial_research_ai:0 "Department of Scientific And Industrial Research"
 NZL_department_of_scientific_and_industrial_research_ai_desc:0 "The other Commonwealth and Dominion nations are investing in scientific and industrial research, so we should do the same."
 NZL_industrial_conscription_ai:0 "Industrial Conscription"
 NZL_industrial_conscription_ai_desc:0 "There is no reason for any able bodied man to not be serving in the armed forces or working in a war related industry. Our new laws will put every shoulder to the wheel of mobilization and production."
 NZL_think_big_ai:0 "Think Big"
 NZL_think_big_ai_desc:0 "We have become accustomed to see ourselves as a lesser Dominion than our Aussie or Canadian allies. But New Zealand is fully capable of industrial greatness."
 NZL_project_seal_ai:0 "Project Seal"
 NZL_project_seal_ai_desc:0 "Project Seal is a new initiative with the Americans to develop a weapon that can trigger tsunamis to overwhelm our enemies. It is a little fanciful, but the bouncing bomb that has been developed shows great promise."
 NZL_national_defense_institute_ai:0 "National Defense Institute"
 NZL_national_defense_institute_ai_desc:0 "Now that New Zealand is fully a sovereign nation we are no longer receiving access to advanced prototypes and blueprints like we previously did. We must ensure that we alway stay ahead of our enemies, and do not fall behind in technology."
 NZL_expand_the_university_of_auckland_ai:0 "Expand the University of Auckland"
 NZL_expand_the_university_of_auckland_ai_desc:0 "The University of Auckland is our most important post-secondary institution. By expanding its facilities, we can try to keep some of our finest minds here at home."
 NZL_army_reforms_ai:0 "Army Reforms"
 NZL_army_reforms_ai_desc:0 "We should modernize our army's training and promotion system. This way we can be prepared for whatever happens in the ongoing world crisis."
 NZL_charlton_automatic_rifle_ai:0 "Charlton Automatic Rifle"
 NZL_charlton_automatic_rifle_ai_desc:0 "One of our citizens has modified the standard Lee Enfield rifle into a full automatic gun. This is New Zealand ingenuity at its best and we should encourage innovation along these lines."
 NZL_bob_semple_tank_ai:0 "Bob Semple Tank"
 NZL_bob_semple_tank_ai_desc:1 "Why shouldn't New Zealand have its own tank? The Ministry of Works in Temuka is developing a light tank armed with only machine guns. Even if we never get this beyond a prototype, the experience we gain will be invaluable."
 NZL_domestic_arms_industry_ai:0 "Domestic Arms Industry"
 NZL_domestic_arms_industry_ai_desc:0 "We should turn as many industries as we can over to the production of small arms. We need ammunition, gun parts, support equipment and so forth. These can be made domestically."
 NZL_schofield_tank_ai:0 "Schofield Tank"
 NZL_schofield_tank_ai_desc:0 "If the Semple Tank didn't meet our needs, maybe a tank with a proper cannon will do the trick. The combined wheel/track system is original and might lead us to new insights into tank design."
 NZL_long_range_patrol_ai:0 "Long Range Patrol"
 NZL_long_range_patrol_ai_desc:0 "The Long Range Patrol is intended to cover wide expanses of territory in North Africa. This reconnaissance and commando unit will undertake special missions in some of the world's harshest climates."
 NZL_artillery_focus_ai:0 "Artillery Focus"
 NZL_artillery_focus_ai_desc:0 "Artillery is crucial for the support of any forward movement by our infantry. Expand research into ballistics and larger barrel guns."
 NZL_big_bob_tank_ai:0 "Big Bob Tank"
 NZL_big_bob_tank_ai_desc:0 "The battlefields of Europe are calling for heavier armor to compete with the super tanks of our enemies. The Big Bob will be New Zealand's contribution to this design effort."
 NZL_the_first_labor_government_ai:0 "The First Labour Government"
 NZL_the_first_labor_government_ai_desc:0 "The First Labour Government for New Zealand has the opportunity to pursue a progressive social and economic agenda. Industrial regulation, workers' rights, social welfare laws and rules for wages are all on the agenda."
 NZL_ratana_alliance_ai:0 "Ratana Alliance"
 NZL_ratana_alliance_ai_desc:0 "An alliance with the Ratana movement will bring Maori New Zealanders into the government and hopefully begin to heal some of the wounds of British conquest."
 NZL_maori_affairs_act_ai:0 "Maori Affairs Act"
 NZL_maori_affairs_act_ai_desc:0 "Much of the land owned by Maori is economically unproductive. If we can consolidate it and bring more under government control, we can turn these barren locations into fruitful sites of industry and commerce."
 NZL_social_security_act_ai:0 "Social Security Act"
 NZL_social_security_act_ai_desc:0 "The unemployed of New Zealand need to be taken care of until the economy recovers and more jobs are available. We started with a Christmas bonus in 1935, but the time has come for a proper social safety net for all citizens."
 NZL_the_manpower_act_ai:0 "The Manpower Act"
 NZL_the_manpower_act_ai_desc:0 "Ever since the war started, Maori have come to the cities in large numbers. The Manpower Act will lets us steer those energies into New Zealand factories."
 NZL_amend_the_maori_affairs_act_ai:0 "Amend the Maori Affairs Act"
 NZL_amend_the_maori_affairs_act_ai_desc:0 "We must amend the Maori Affairs Act so that it boost the productivity of underutilized lands, but doesn't needlessly displace our Maori citizens."
 NZL_waitangi_tribunal_ai:0 "Waitangi Tribunal"
 NZL_waitangi_tribunal_ai_desc:0 "British New Zealanders should come to terms with what their ancestors did to displace, disrupt and marginalize the Maori of New Zealand. Bloody wars, land seizures, and natural rights ignored. Recognizing this legacy is a step to healing."
 NZL_maori_conscription_ai:0 "Maori Conscription"
 NZL_maori_conscription_ai_desc:0 "The bravery and heroism of the Maori Battalion attached to the Expeditionary Force is a sign that we should make the most of our entire population by drafting even the reluctant Maori into the service."
 NZL_maori_volunteers_ai:0 "Maori Volunteers"
 NZL_maori_volunteers_ai_desc:0 "Showing their patriotism, hundreds of Maori are stepping up to volunteer for service in the New Zealand army."
 NZL_strengthen_the_commonwealth_ai:0 "Strengthen the Commonwealth"
 NZL_strengthen_the_commonwealth_ai_desc:0 "As a smaller Dominion, it is important to stick close to our friends and family. We will reinforce our ties to our fellow British territories."
 NZL_2nzef_ai:0 "2NZEF"
 NZL_2nzef_ai_desc:0 "Despite the horrors of the last war, New Zealand is ready to march again. The 2nd New Zealand Expeditionary Force is being organized as we speak."
 NZL_arrest_pacifist_leaders_ai:0 "Arrest Pacifist Leaders"
 NZL_arrest_pacifist_leaders_ai_desc:0 "Now is not a time for dissension within the country. Everyone must focus on winning the war, and if that means detaining any who speak against the war, then that is what we will do."
 NZL_technology_sharing_with_britain_ai:0 "Technology Sharing With Britain"
 NZL_technology_sharing_with_britain_ai_desc:0 "Great Britain's scientific and industrial base far exceeds our own, but since we are family, they are willing to share what they know with us."
