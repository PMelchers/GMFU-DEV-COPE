  ITA_culto_il_duce:0 "Culto Del Duce"
  ITA_culto_il_duce_desc:0 "Benito Mussolini, Conqueror of Africa, Avenger of Adwa, is without a doubt the most important Italian statesman since the days of the Roman Emperors. He is the absolute pinnacle of masculinity, entirely without fear. We should ensure that every Italian knows that they should forever strife to become as similar to Mussolini as humanly possible"
  ITA_start_italianisation_alb:0 "Start Albanian Italianisation"
  ITA_start_italianisation_alb_desc:0 ""
