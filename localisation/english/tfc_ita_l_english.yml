  ITA_lock_the_med:0 "The Gates of the Empire"
  ITA_lock_the_med_desc:0 "With Gibraltar and Suez in our hands, the entrances to the Mediterranean are no longer gateways for our enemies but gates of our Empire. By fortifying these strategic straits, we can seal the sea that the Romans once called Mare Nostrum and ensure that no hostile fleet may enter without facing the full might of Italy. The Mediterranean shall become the heart of our dominion, protected by the iron gates of the Empire."
