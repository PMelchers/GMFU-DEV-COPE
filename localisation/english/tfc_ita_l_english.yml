  ITA_reclaim_carthage:0 "Reclaim Carthage"
  ITA_reclaim_carthage_desc:0 "Carthage, once the greatest rival of Rome, was destroyed and rebuilt by our ancestors. Its lands now lie under foreign names and influence, but Italy shall restore them to their rightful place. By reclaiming Carthage, we revive the glory of Rome and secure our southern shores. The jewel of Africa shall rise again under Italian rule."
  ITA_fourth_coast:0 "Quarta Sponda"
  ITA_fourth_coast_desc:0 "The northern African coast is not a colony, but the Fourth Shore of Italy. These lands shall be integrated, their ports and fields serving the strength of the Italian state. Italian settlers will bring order and prosperity, making the southern Mediterranean firmly ours. The Quarta Sponda shall stand as a permanent part of the Italian Empire."
