  #EVENT STUFF
  KIH_convene_council.1.t:0 "The Fate of Italy"
  KIH_convene_council.1.desc:0 "The Grand Council has been convened for the first time in years. Behind closed doors, the most powerful men of Italy gather to decide the future of the nation. Shall Il Duce reaffirm his absolute authority, or will the Council dare to place its trust in a new leader? The fate of the regime — and of Italy itself — hangs in the balance."

